<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕНЮ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <div class="profile">
            <img class="avatar" id="avatar" src="" alt="АВАТАР">
            <span class="username" id="username">ИМЯ</span>
        </div>
        <div class="wallet">
            <div class="wallet-balances">
                <div class="wallet-row">
                    <span class="wallet-icon">🥈</span>
                    <span class="wallet-value" id="silverBalance">0</span>
                </div>
                <div class="wallet-horizontal-divider"></div>
                <div class="wallet-row">
                    <span class="wallet-icon">🪙</span>
                    <span class="wallet-value" id="goldBalance">0</span>
                </div>
            </div>
            <div class="wallet-vertical-divider"></div>
            <button class="wallet-add-btn" id="depositBtn">+</button>
        </div>
    </header>

    <hr class="divider">

    <!-- ===== СЕКЦИЯ ИГР ===== -->
    <section class="games-section" id="gamesSection">
        <h3 class="section-title">ИГРЫ</h3>
        <div class="games-container">
            <div class="game-card" id="game-rocket">
                <p class="game-name">РАКЕТА</p>
                <div class="game-preview">
                    <img src="raketa.jpg" alt="РАКЕТА">
                    <div class="game-preview-fade"></div>
                </div>
            </div>
            <div class="game-card" id="game-bomb">
                <p class="game-name">БОМБА</p>
                <div class="game-preview">
                    <img src="bomba.jpg" alt="БОМБА">
                    <div class="game-preview-fade"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== СЕКЦИЯ ПРОФИЛЬ ===== -->
    <section class="profiles" id="profileSection">ПРОФИЛЬ</section>

    <!-- ===== СЕКЦИЯ ЗАДАНИЯ ===== -->
    <section class="qwest" id="tasksSection">ЗАДАНИЯ</section>

    <!-- ===== СЕКЦИЯ ПОПОЛНЕНИЕ ===== -->
    <section class="kripta" id="depositSection">ПОПОЛНЕНИЕ</section>

    <!-- ===== ИГРА "РАКЕТА" ===== -->
    <section class="rocket-game" id="rocketGame" style="display: none;">
    <div class="rocket-header">
        <button class="rocket-back-btn" id="rocketBackBtn">← НАЗАД</button>
        <div class="rocket-balance"><span>🪙</span> <span id="rocketGoldBalance">0</span></div>
    </div>
    <div class="rocket-canvas-area">
        <canvas id="rocketCanvas"></canvas>
        <div class="rocket-multiplier" id="rocketMultiplier">1.00x</div>
        <div class="rocket-timer" id="rocketTimer"></div>
    </div>
    <div class="rocket-history" id="rocketHistory"></div>
    <div class="rocket-players" id="rocketPlayers"></div>
    <button class="rocket-action-btn" id="rocketBetBtn">СДЕЛАТЬ СТАВКУ</button>
    <button class="rocket-action-btn rocket-cashout-btn" id="rocketCashoutBtn" style="display:none;">🛑 ЗАБРАТЬ <span id="rocketWin">0 🪙</span></button>
    <!-- Модалка ставки оставляем твою -->
</section>


    <!-- ===== НИЖНЕЕ МЕНЮ ===== -->
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-play">
            <span class="nav-icon">🎮</span>
            <span class="nav-label">ИГРАТЬ</span>
        </div>
        <div class="nav-item" id="nav-profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">ПРОФИЛЬ</span>
        </div>
        <div class="nav-item" id="nav-tasks">
            <span class="nav-icon">📋</span>
            <span class="nav-label">ЗАДАНИЯ</span>
        </div>
        <div class="nav-item" id="nav-deposit">
            <span class="nav-icon">💳</span>
            <span class="nav-label">ПОПОЛНЕНИЯ</span>
        </div>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
