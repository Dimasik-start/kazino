<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .game-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #multiplier { font-size: 80px; font-weight: bold; color: #f0b90b; text-shadow: 0 0 20px rgba(240, 185, 11, 0.5); }
        .rocket { font-size: 50px; transition: transform 0.1s linear; margin-top: 20px; }
        .btn { background: #f0b90b; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 50px; }
        .admin-panel { position: absolute; top: 10px; right: 10px; }
        #crash-btn { background: #ff4d4d; color: white; padding: 5px 10px; font-size: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="status">ОЖИДАНИЕ...</div>
        <div id="multiplier">x1.00</div>
        <div id="rocket" class="rocket">🚀</div>
        <button class="btn" onclick="startGame()">СТАВКА</button>
        
        <div class="admin-panel">
            <button id="crash-btn" onclick="forceCrash()">ADMIN CRASH</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentX = 1.00;
        let isFlying = false;
        
        // Показываем кнопку админа, если это ты
        if (tg.initDataUnsafe.user.id == 123456789) { // ВСТАВЬ СВОЙ ID
            document.getElementById('crash-btn').style.display = 'block';
        }

        async function startGame() {
            if (isFlying) return;
            isFlying = true;
            currentX = 1.00;
            document.getElementById('status').innerText = "В ПОЛЕТЕ!";
            
            // Получаем точку краша от Python (имитация запроса)
            // В реальности тут будет fetch('https://твой-хост/get_multiplier?bet=400&curr=stars')
            let crashPoint = 2.50; 
            
            let interval = setInterval(() => {
                currentX += 0.02;
                document.getElementById('multiplier').innerText = x${currentX.toFixed(2)};
                
                // Анимация тряски ракеты
                document.getElementById('rocket').style.transform = translateY(${Math.sin(Date.now()/100)*10}px) scale(${1 + currentX/10});

                if (currentX >= crashPoint) {
                    clearInterval(interval);
                    isFlying = false;
                    document.getElementById('multiplier').style.color = 'red';
                    document.getElementById('status').innerText = "КРАШ!";
                    document.getElementById('rocket').innerText = "💥";
                    setTimeout(() => {
                        document.getElementById('rocket').innerText = "🚀";
                        document.getElementById('multiplier').style.color = '#f0b90b';
                    }, 2000);
                }
            }, 50);
        }

        function forceCrash() {
            // Сигнал на бэкенд для краша (нужен твой API)
            fetch('/admin_crash?secret=' + tg.initDataUnsafe.user.id, {method: 'POST'});
        }
    </script>
</body>
</html>
