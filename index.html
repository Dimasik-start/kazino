<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>
<body>

   
    <header class="header">
        <div class="profile" id="profile">
            <img class="avatar" id="avatar" src="user.photo_url" alt="">
            <span class="username" id="username">user.first_name</span>
        </div>
        <div class="wallet" id="wallet">
            <div class="balance" id="balance">💰 12,450</div>
            <button class="deposit-btn" id="depositBtn">💵 Пополнить</button>
        </div>
    </header>
    
    <hr class="divider">

   
    <section class="games-section">
        <h3 class="section-title">🎮 Игры</h3>
        
        <div class="games-container">
           
            <div class="game-card" id="game-rocket">
                <div class="game-icon">🚀</div>
                <p class="game-name">Ракета</p>
            </div>
            
            
            <div class="game-card" id="game-bomb">
                <div class="game-icon">💣</div>
                <p class="game-name">Бомба</p>
            </div>
        </div>
    </section>

    <hr class="divider">

    
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-play">
            <span class="nav-icon">🎮</span>
            <span class="nav-label">Играть</span>
        </div>
        <div class="nav-item" id="nav-profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профиль</span>
        </div>
        <div class="nav-item" id="nav-tasks">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Задания</span>
        </div>
        <div class="nav-item" id="nav-deposit">
            <span class="nav-icon">💳</span>
            <span class="nav-label">Пополнения</span>
        </div>
    </nav>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // 1. Получаем доступ к Telegram
    let tg = window.Telegram.WebApp;
    
    // 2. Разворачиваем на весь экран
    tg.expand();
    
    // 3. Достаём данные пользователя
    let user = tg.initDataUnsafe.user;
    
    // 4. Находим элементы на странице
    let usernameEl = document.getElementById('username');
    let avatarEl = document.getElementById('avatar');
    
    // 5. Проверяем, есть ли пользователь
    if (user) {
        // Меняем имя
        usernameEl.textContent = user.first_name;
        
        // Меняем аватарку (если есть)
        if (user.photo_url) {
            avatarEl.src = user.photo_url;
        } else {
            // Заглушка, если нет фото
            avatarEl.src = 'https://ui-avatars.com/api/?name=' + user.first_name + '&background=3b82f6&color=fff';
        }
    } else {
        // Если запущено не в Telegram (для отладки в браузере)
        usernameEl.textContent = 'Гость';
        avatarEl.src = 'https://ui-avatars.com/api/?name=Guest&background=3b82f6&color=fff';
    }
</script>
</body>
</html>
